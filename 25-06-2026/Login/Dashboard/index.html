<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./index.css" />
    <title>Dashboard</title>
  </head>
  <body>
    <!-- <div class="container">
      <div class="child">1</div>
      <div class="child second">2</div>
      <div class="child">3</div>
      <div class="child fourth">4</div>
    </div> -->
    <header class="header">
      <h1 class="heading">Admin</h1>
      <div class="profile-pic-wrapper">
        <img
          class="profile-pic"
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYWOtWaNVf78wGPcTjV6m__rJQhvF5Mz8yEhoQcHdvWBK6dtuTUahpBIg&s=10"
          alt="profile"
        />
      </div>
    </header>
    <section class="body">
      <h2 class="main-heading">Dashboard</h2>
      <div class="data">
        <h3 class="sub-heading">User Data</h3>
        <div class="cards-wrapper">
          <div class="card">
            <h4 class="card-heading">Registered User</h4>
            <p class="count">500</p>
          </div>
          <div class="card">
            <h4 class="card-heading">Verified User</h4>
            <p class="count">450</p>
          </div>
          <div class="card">
            <h4 class="card-heading">Checked-In User</h4>
            <p class="count">50</p>
          </div>
          <div class="card">
            <h4 class="card-heading">Blocked User</h4>
            <p class="count">50</p>
          </div>
          <div class="card">
            <h4 class="card-heading">Deleted User</h4>
            <p class="count">41</p>
          </div>
        </div>
      </div>
      <div class="tabs">
        <button class="check-in-btn actin-btn">Recent Check Ins</button>
        <button class="transaction-btn actin-btn">Recent Transactions</button>
      </div>
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th class="t-heading">Sr. No.</th>
              <th class="t-heading">User Name</th>
              <th class="t-heading">TSR ID</th>
              <th class="t-heading">Check In Date/Time</th>
              <th class="t-heading">Checked-In By</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="t-data" colspan="5" align="center">
                No entries found
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </body>
</html>
